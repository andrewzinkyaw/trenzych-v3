name: Update Ping

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ping Servers
        run: |
          SG=$(ping -c 4 1.1.1.1 | tail -1 | awk -F'/' '{print int($5)}')
          JP=$(ping -c 4 8.8.8.8 | tail -1 | awk -F'/' '{print int($5)}')
          US=$(ping -c 4 9.9.9.9 | tail -1 | awk -F'/' '{print int($5)}')

          cat > data/ping.json <<EOF
          {
            "Singapore": $SG,
            "Japan": $JP,
            "USA": $US
          }
          EOF

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/ping.json

          git commit -m "Update ping" || exit 0

          git push

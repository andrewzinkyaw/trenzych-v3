<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit VLESS Key</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
    padding:35px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#111827;
    padding:30px;
    border-radius:14px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

textarea{
    height:220px;
    resize:vertical;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.back{
    display:block;
    margin-top:25px;
    color:#fff;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<h1>Edit VLESS Key</h1>

<input
id="title"
placeholder="Title">

<input
id="country"
placeholder="Country">

<select id="type">
<option value="VLESS">VLESS</option>
<option value="Trojan">Trojan</option>
<option value="Shadowsocks">Shadowsocks</option>
<option value="Hysteria">Hysteria</option>
</select>

<select id="plan">
<option value="0">Free</option>
<option value="1">Premium</option>
</select>

<textarea
id="config"
placeholder="Paste Config"></textarea>

<button onclick="saveKey()">
Save Changes
</button>

<a
href="keys.html"
class="back">
← Back Manage Keys
</a>

</div>

<script src="../assets/js/edit.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TRENZYCH VPN Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}

header{
    background:#1e293b;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

a{
    display:block;
    margin-bottom:15px;
    padding:15px;
    text-align:center;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
}

.logout{
    background:#dc2626;
}
</style>

</head>

<body>

<header>
TRENZYCH VPN ADMIN
</header>

<div class="container">

<div class="card">
<h2>Welcome Admin</h2>
<p>Manage your VLESS Keys.</p>
</div>

<a href="upload.html">
Upload VLESS Key
</a>

<a href="keys.html">
Manage Keys
</a>

<a href="#" class="logout" onclick="logout()">
Logout
</a>

</div>

<script>
// Login Check
if(localStorage.getItem("admin") !== "true"){
    window.location.href="index.html";
}

// Logout
function logout(){
    localStorage.removeItem("admin");
    window.location.href="index.html";
}
</script>

</body>
</html>

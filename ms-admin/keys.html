<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Manage Keys</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

h1{
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
font-size:16px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.title{
font-size:20px;
font-weight:bold;
}

.country{
color:#94a3b8;
margin:5px 0;
}

.plan{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:13px;
background:#2563eb;
margin-bottom:10px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:8px;
padding:10px;
resize:none;
margin-top:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.copy{
background:#2563eb;
color:#fff;
}

.delete{
background:#dc2626;
color:#fff;
}

.back{
display:block;
margin-top:25px;
color:#fff;
text-decoration:none;
}
</style>
</head>

<body>

<h1>Manage Keys</h1>

<input id="search" placeholder="Search">

<select id="filter">
<option value="">All</option>
<option value="Free">Free</option>
<option value="Premium">Premium</option>
</select>

<div id="list"></div>

<a href="dashboard.html" class="back">← Back Dashboard</a>

<script src="../assets/js/keys.js?v=2"></script>

</body>
</html>

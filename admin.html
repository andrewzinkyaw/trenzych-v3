<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRENZYCH VPN Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/admin.css">

</head>

<body>

<div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="sidebar-header">
    <button id="closeSidebar" class="close-sidebar">
        ✕
    </button>
</div>

        <div class="logo">
            🛠️
            <h2>TRENZYCH</h2>
        </div>

        <a class="nav-link active" href="#">
            📊 Dashboard
        </a>

        <a class="nav-link" href="#addvpn">
            ➕ Add VPN
        </a>

        <a class="nav-link" href="#vpnlist">
            📂 VPN List
        </a>

        <a class="nav-link" href="#">
            ⚙️ Settings
        </a>

        <button id="logoutBtn" class="logout-btn">
            🚪 Logout
        </button>

    </aside>

    <!-- Main -->

    <main class="content">
<div class="topbar">

    <button id="menuToggle" class="menu-toggle">
        ☰
    </button>

    <h2>TRENZYCH VPN PANEL</h2>

</div>
        
<!-- Dashboard -->

<section id="dashboardPage" class="page">

    <h1>Dashboard</h1>

    <div class="stats">

        <div class="stat-card">
            <h2 id="totalKeys">0</h2>
            <p>Total Keys</p>
        </div>

        <div class="stat-card">
            <h2 id="freeKeys">0</h2>
            <p>Free Keys</p>
        </div>

        <div class="stat-card">
            <h2 id="premiumKeys">0</h2>
            <p>Premium Keys</p>
        </div>

    </div>

</section>

<!-- Add VPN -->

<section id="addvpnPage" class="page" style="display:none;">

    <h1>Add VPN</h1>

    <form id="vpnForm">

        <input
            id="title"
            placeholder="VPN Name"
            required
        >

        <select id="country">
            <option>Singapore</option>
            <option>Japan</option>
            <option>USA</option>
        </select>

        <select id="type">
            <option>VLESS</option>
            <option>VMESS</option>
            <option>Trojan</option>
            <option>Shadowsocks</option>
            <option>Outline</option>
        </select>

        <select id="premium">
            <option value="0">FREE</option>
            <option value="1">PREMIUM</option>
        </select>

        <textarea
            id="config"
            placeholder="Paste VPN Config..."
            required
        ></textarea>

        <button type="submit">
            ➕ Save VPN
        </button>

    </form>

</section>

<!-- VPN List -->

<section id="vpnlistPage" class="page" style="display:none;">

    <h1>VPN List</h1>

    <div id="vpnTable"></div>

</section>

<!-- Settings -->

<section id="settingsPage" class="page" style="display:none;">

    <h1>Settings</h1>

    <p>Coming Soon...</p>

</section>
        </div>

    </main>

</div>
    
<script src="assets/js/admin.js"></script>
</body>
</html>
